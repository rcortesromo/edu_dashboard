name: Refresh Feathery

on:
  workflow_dispatch:
  schedule:
    # Fridays 14:00 UTC = 8:00 AM CDMX (UTC-6). Staggered 2h after the metrics
    # workflow (12:00 UTC) only to avoid both jobs pushing to the same branch at
    # the same time; the metrics workflow no longer touches the Feathery API.
    - cron: "0 14 * * 5"

permissions:
  contents: write

jobs:
  refresh_feathery:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Feathery credentials
        run: |
          cat > .env.local <<'EOF'
          FEATHERY_TOKEN=${{ secrets.FEATHERY_TOKEN }}
          EOF

      - name: Refresh Feathery data
        run: npm run refresh:feathery

      # Includes untracked files (new per-cycle archive folders) via git status,
      # which git diff would miss.
      - name: Detect data changes
        id: detect
        run: |
          if [ -n "$(git status --porcelain -- public/data/feathery-products.generated.json \
                                                 public/data/feathery-checkouts.generated.json \
                                                 public/data/feathery-cycles.generated.json \
                                                 public/data/feathery-cycles \
                                                 backend/feathery/generated)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed feathery
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/feathery-products.generated.json \
                  public/data/feathery-checkouts.generated.json \
                  public/data/feathery-cycles.generated.json \
                  public/data/feathery-cycles \
                  backend/feathery/generated
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
          else
            git commit -m "refresh feathery data"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Upload refresh summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feathery-refresh-summary
          path: backend/feathery/generated/feathery-refresh-summary.json
          if-no-files-found: warn
