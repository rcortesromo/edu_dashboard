name: Refresh Metrics JSON

on:
  workflow_dispatch:
    inputs:
      quarter:
        description: Optional quarter override in YYYY-Q# format
        required: false
        type: string
  schedule:
    - cron: "0 12 * * 5" # Fridays 12:00 UTC = 6:00 AM CDMX (UTC-6)

permissions:
  contents: write

jobs:
  refresh_metrics:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write metrics credentials
        run: |
          cat > .env.local <<'EOF'
          JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
          AI_METRICS_GITHUB_TOKEN=${{ secrets.AI_METRICS_GITHUB_TOKEN }}
          CURSOR_TOKEN=${{ secrets.CURSOR_TOKEN }}
          FEATHERY_TOKEN=${{ secrets.FEATHERY_TOKEN }}
          EOF

      - name: Refresh metrics assets
        run: |
          if [ -n "${{ inputs.quarter }}" ]; then
            npm run refresh:static-metrics -- --quarter "${{ inputs.quarter }}"
          else
            npm run refresh:static-metrics
          fi

      - name: Detect data changes
        id: detect
        run: |
          if git diff --quiet -- public/data/metrics.generated.json \
                                  backend/published/json/metrics.generated.json \
                                  public/data/feathery-products.generated.json \
                                  backend/feathery/generated/feathery-products.generated.json \
                                  backend/feathery/generated/feathery-products-clients.csv \
                                  backend/feathery/generated/feathery-products-totals.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed metrics
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/published/json/metrics.generated.json \
                  public/data/metrics.generated.json \
                  backend/published/refresh-summary.json \
                  public/data/feathery-products.generated.json \
                  backend/feathery/generated/feathery-products.generated.json \
                  backend/feathery/generated/feathery-products-clients.csv \
                  backend/feathery/generated/feathery-products-totals.csv
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
          else
            git commit -m "refresh metrics json"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Render run log
        if: always()
        run: node scripts/published/render-run-log.mjs

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-summary
          path: backend/published/refresh-summary.json
          if-no-files-found: warn
